<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RecipeBook</title>
  <meta name="description" content="Browse simple, tasty recipes in RecipeBook.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="Browse simple, tasty recipes in RecipeBook.">
  <meta property="og:url" content="https://yourusername.github.io/wdd131/recipes/">
  <meta property="og:image" content="https://yourusername.github.io/wdd131/recipes/images/social-preview.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="Browse simple, tasty recipes in RecipeBook.">
  <meta name="twitter:image" content="https://yourusername.github.io/wdd131/recipes/images/social-preview.png">

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="images/recipe-book.png" alt="RecipeBook logo">
      <h1>RecipeBook</h1>
    </div>
  </header>

  <main class="page">
    <section class="search-section" aria-label="Recipe search">
      <form class="search-bar" action="#" method="get">
        <input type="search" name="q" placeholder="Find a recipe" aria-label="Find a recipe">
        <button type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="22" y2="22"></line>
          </svg>
        </button>
      </form>
    </section>

    <section class="recipes">
      <article class="recipe-card">
        <img class="recipe-image" src="images/apple-crisp.jpg" alt="Apple crisp in a bowl with ice cream">

        <div class="recipe-content">
          <p class="recipe-tag">dessert</p>

          <h2>Apple Crisp</h2>

          <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
          </span>

          <p class="recipe-description">
            This apple crisp recipe is a simple yet delicious fall dessert that's
            great served warm with vanilla ice cream.
          </p>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
